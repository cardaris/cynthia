name: Deploy to GitHub Pages

# Redeploys the app on every push to main. Also runnable on demand.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token scoped to what Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve Pages base path
        id: pages
        uses: actions/configure-pages@v5

      - run: npm ci

      - name: Build static export
        env:
          # base_path from configure-pages is like "/cynthia" for a project site.
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_BUILD_SHA: ${{ github.sha }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
